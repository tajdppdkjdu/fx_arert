name: FX Alert Bot

# いつこのロボットを動かすか（トリガー）の設定
on:
  schedule:
    - cron: '*/15 * * * *'  # 15分ごとに実行するという世界共通の書き方です
  workflow_dispatch:        # 手動で「今すぐ動かす」ボタンを付けるおまじないです

jobs:
  run-bot:
    runs-on: ubuntu-latest  # 最新の無料コンピューターを借ります
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonの準備
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 必要なツールのインストール
        run: pip install -r requirements.txt

      - name: ロボット（bot.py）の実行
        env:
          # ここで先ほど作った「金庫」から鍵を取り出してロボットに渡します
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python bot.py
